<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickfigure Game - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.5);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 2px solid #00ff88;
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }
        
        p {
            font-size: 1.2em;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .game-link {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: black;
            font-size: 1.5em;
            font-weight: bold;
            text-decoration: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
        }
        
        .game-link:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.6);
        }
        
        .game-link:active {
            transform: scale(0.98);
        }
        
        .developer-info {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #00ff88;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Stickfigure Game</h1>
        <p>Welcome to the Stickman Fighter Arena!</p>
        <p>Battle your way through an intense fight against the computer opponent. Use your martial arts skills, sword, and laser attacks to defeat your enemy!</p>
        
        <a href="Stickfigurefight.html" class="game-link">
            ▶️ Play Game
        </a>
        
        <div class="developer-info">
            <p><strong>Developed by:</strong> Ashish Pandey</p>
            <p>A student from Vidya Mandir Estancia School</p>
        </div>
    </div>
</body>
</html>
